<div class="notification-menu" data-notifications-url="{% url 'notifications:status' %}" data-notifications-list-url="{% url 'notifications:list' %}">
  <button class="notification-bell" type="button" title="Notificaciones">
    &#128276;
    {% if notification_unread_count %}
      <span class="notification-count">{{ notification_unread_count }}</span>
    {% endif %}
  </button>
  <div class="notification-dropdown" aria-live="polite">
    <div class="notification-dropdown-header">Notificaciones</div>
    <div class="notification-dropdown-items">
      {% for notificacion in notification_latest %}
        <a class="notification-dropdown-item" data-notification-link="1" data-mark-read-url="{% url 'notifications:mark_read' notificacion.id %}" href="{% if notificacion.url %}{{ notificacion.url }}{% else %}{% url 'notifications:list' %}{% endif %}">
          <strong>{{ notificacion.titulo }}</strong>
          <span>{{ notificacion.mensaje|truncatechars:90 }}</span>
        </a>
      {% empty %}
        <div class="notification-dropdown-empty">No tienes notificaciones.</div>
      {% endfor %}
    </div>
    <div class="notification-dropdown-footer">
      <a href="{% url 'notifications:list' %}">Ver todas</a>
    </div>
  </div>
</div>
