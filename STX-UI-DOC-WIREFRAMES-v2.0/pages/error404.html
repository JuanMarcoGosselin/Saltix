<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SALTIX — Error 404</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/error404.css">
</head>
<body>
  <div class="error-container">

    <!-- Logo -->
    <div class="error-logo">
      <div class="error-logo-mark">SX</div>
      <span class="error-logo-text">SALTIX</span>
    </div>

    <!-- Chip de estado -->
    <div class="error-chip">
      <span class="error-chip-dot"></span>
      Página no encontrada
    </div>

    <!-- Ilustración flotante -->
    <div class="error-illustration">
      <img src="../img/error404/error-404.png" alt="Error 404">
    </div>

    <!-- Código -->
    <div class="error-code">404</div>

    <!-- Textos -->
    <h1 class="error-title">Página no encontrada</h1>
    <p class="error-subtitle">No pudimos encontrar la página que buscabas. Es posible que haya sido movida, eliminada o que la URL sea incorrecta.</p>

    <!-- Botón -->
    <button class="error-btn" onclick="history.back()">
      <span class="error-btn-icon">←</span>
      Volver al inicio
    </button>

  </div>
</body>
</html>
